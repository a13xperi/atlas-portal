name: CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run build

  resolve-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      preview_url: ${{ steps.resolve.outputs.url }}
    permissions:
      contents: read
      deployments: read
      pull-requests: read
    steps:
      - name: Resolve Vercel preview URL
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullRequest = context.payload.pull_request;

            if (!pullRequest) {
              core.setFailed("Missing pull request payload.");
              return;
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            function normalizeUrl(rawUrl) {
              if (!rawUrl) return null;
              const withProtocol = rawUrl.startsWith("http") ? rawUrl : `https://${rawUrl}`;
              const normalized = withProtocol.replace(/\/$/, "");

              try {
                const parsed = new URL(normalized);
                if (!parsed.hostname.endsWith(".vercel.app")) return null;
                return parsed.toString().replace(/\/$/, "");
              } catch {
                return null;
              }
            }

            function extractPreviewUrl(body) {
              if (!body) return null;

              const markdownMatch = body.match(/\[Preview\]\((https:\/\/[^)]+\.vercel\.app)\)/i);
              if (markdownMatch?.[1]) {
                return normalizeUrl(markdownMatch[1]);
              }

              const genericMatch = body.match(/https:\/\/[^\s)]+\.vercel\.app/gi);
              if (!genericMatch) return null;

              for (const candidate of genericMatch.reverse()) {
                const normalized = normalizeUrl(candidate);
                if (normalized) return normalized;
              }

              return null;
            }

            async function findDeploymentPreviewUrl() {
              const deployments = await github.paginate(
                github.rest.repos.listDeployments,
                {
                  owner,
                  repo,
                  sha: pullRequest.head.sha,
                  per_page: 100,
                },
              );

              for (const deployment of deployments) {
                const statuses = await github.paginate(
                  github.rest.repos.listDeploymentStatuses,
                  {
                    owner,
                    repo,
                    deployment_id: deployment.id,
                    per_page: 100,
                  },
                );

                for (const status of statuses) {
                  const normalized =
                    normalizeUrl(status.environment_url) ||
                    normalizeUrl(status.target_url);

                  if (
                    normalized &&
                    ["success", "ready"].includes(status.state)
                  ) {
                    return normalized;
                  }
                }
              }

              return null;
            }

            async function findCommentPreviewUrl() {
              const comments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number: pullRequest.number,
                  per_page: 100,
                },
              );

              for (const comment of comments.reverse()) {
                if (comment.user?.login !== "vercel[bot]") continue;

                const normalized = extractPreviewUrl(comment.body);
                if (normalized) return normalized;
              }

              return null;
            }

            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const previewUrl =
                (await findDeploymentPreviewUrl()) ||
                (await findCommentPreviewUrl());

              if (previewUrl) {
                core.setOutput("url", previewUrl);
                core.info(`Using Vercel preview URL: ${previewUrl}`);
                return;
              }

              core.info(
                `Vercel preview URL not ready yet (attempt ${attempt}/30). Waiting 10 seconds...`,
              );
              await sleep(10_000);
            }

            core.setFailed(
              `Unable to resolve a ready Vercel preview URL for PR #${pullRequest.number}.`,
            );

  e2e:
    runs-on: ubuntu-latest
    needs: [check, resolve-preview]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Get Vercel preview URL (delphi-atlas project)
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"
          for attempt in $(seq 1 24); do
            DEPLOY_ID=$(gh api "repos/${REPO}/deployments?sha=${SHA}&per_page=50" \
              --jq '[.[] | select(.environment | test("delphi-atlas"))] | first | .id' 2>/dev/null)
            if [ -n "$DEPLOY_ID" ] && [ "$DEPLOY_ID" != "null" ]; then
              ENV_URL=$(gh api "repos/${REPO}/deployments/${DEPLOY_ID}/statuses?per_page=10" \
                --jq '[.[] | select(.state == "success")] | first | .environment_url' 2>/dev/null)
              if [ -n "$ENV_URL" ] && [ "$ENV_URL" != "null" ] && [ "$ENV_URL" != "" ]; then
                echo "PLAYWRIGHT_BASE_URL=${ENV_URL}" >> $GITHUB_ENV
                echo "Using delphi-atlas preview: ${ENV_URL}"
                exit 0
              fi
            fi
            echo "Waiting for delphi-atlas deployment... (${attempt}/24)"
            sleep 5
          done
          SLUG=$(echo "${{ github.head_ref }}" | tr '/' '-')
          echo "PLAYWRIGHT_BASE_URL=https://delphi-atlas-git-${SLUG}-alex-peris-projects.vercel.app" >> $GITHUB_ENV
          echo "Fallback: constructed delphi-atlas URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run test:e2e
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET || secrets.VERCEL_PROTECTION_BYPASS }}
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET || secrets.VERCEL_PROTECTION_BYPASS }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  e2e-extended:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
            - project: a11y
            - project: errors
            - project: performance
            - project: visual
              # Visual tests require Linux baselines committed via the
              # update-visual-baselines workflow. Allow failures until
              # baselines exist — they will then lock in automatically.
              continue_on_error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Get Vercel preview URL
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"
          for attempt in $(seq 1 24); do
            DEPLOY_ID=$(gh api "repos/${REPO}/deployments?sha=${SHA}&per_page=50" \
              --jq '[.[] | select(.environment | test("delphi-atlas"))] | first | .id' 2>/dev/null)
            if [ -n "$DEPLOY_ID" ] && [ "$DEPLOY_ID" != "null" ]; then
              ENV_URL=$(gh api "repos/${REPO}/deployments/${DEPLOY_ID}/statuses?per_page=10" \
                --jq '[.[] | select(.state == "success")] | first | .environment_url' 2>/dev/null)
              if [ -n "$ENV_URL" ] && [ "$ENV_URL" != "null" ] && [ "$ENV_URL" != "" ]; then
                echo "PLAYWRIGHT_BASE_URL=${ENV_URL}" >> $GITHUB_ENV
                echo "Using Vercel preview: ${ENV_URL}"
                exit 0
              fi
            fi
            echo "Waiting for Vercel deployment... (${attempt}/24)"
            sleep 5
          done
          SLUG=$(echo "${{ github.head_ref }}" | tr '/' '-')
          echo "PLAYWRIGHT_BASE_URL=https://delphi-atlas-git-${SLUG}-alex-peris-projects.vercel.app" >> $GITHUB_ENV
          echo "Fallback: constructed URL (may not resolve for long branch names)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx playwright test --config=playwright-e2e.config.ts --project=${{ matrix.project }}
        continue-on-error: ${{ matrix.continue_on_error == true }}
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET || secrets.VERCEL_PROTECTION_BYPASS }}
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET || secrets.VERCEL_PROTECTION_BYPASS }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-${{ matrix.project }}-report
          path: test-results/
          retention-days: 14
